<html>
<head>
	<title>Login Page</title>
	
	<style>
		body{font-family: Bradley Hand ITC; background-color: Black; font-color: white; display: flex; justify-content: center; align-items: center; height: 100vh}
		.login-box{background-color: white; padding: 30px; width: 300px; border-radius: 10px; box-shadow: 0px 0px 10px gray; text-align: center}
		h2{margin-bottom: 20px}
		input{width: 90%; padding: 20px; margin: 10px 0}
		button{width: 95%; padding: 10px; background-color: green; color: white; border: none; border-radius: 5px; font-size: 16px}
		button:hover{background-color: red}
	</style>
</head>
<body>
<div class="login-box">
	<h2>Login</h2>
	<form onsubmit="goToWebsite(event)">
		<label for="username">Username:</label>
		<input type="text" id="username" placeholder="Username" required>
		<label for="password">Password:</label>
		<input type="password" id="password" placeholder="Password" required>
		<button type="submit">Login</button>
	</form>
</div>
<script>
function goToWebsite(event) {
	event.preventDefault(); 

	var username=
document.getElementById("username").value;
	var password=
document.getElementById("password").value;

	if(username === "Himank" && password === "1234") {window.location.href = "Starter.html";} else {alert("Wrong username or password!");}
}
</script>
</body>
</html>
